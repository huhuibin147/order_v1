<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>会话列表</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .session-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 10px 0;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .session-card:active {
      transform: scale(0.98);
    }
    .session-card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .session-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .session-card-code {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 1px;
    }
    .session-card-meta {
      font-size: 12px;
      color: var(--text-light);
    }
    .session-card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .btn-del {
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-del:active {
      background: var(--danger);
      color: #fff;
    }
    .btn-clear {
      background: var(--danger);
      color: #fff;
      border: none;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="appbar">
      <div>
        <h1>会话列表</h1>
      </div>
      <div class="row">
        <button class="btn btn-ghost btn-sm" id="btnExportSummary">导出汇总</button>
        <button class="btn btn-ghost btn-sm" id="btnExportDetail">导出明细</button>
        <button class="btn btn-ghost btn-sm" id="btnClear" style="color:var(--danger);">清空全部</button>
        <a class="btn btn-ghost btn-sm" href="{{ url_for('page_index') }}">首页</a>
      </div>
    </div>

    <div id="content">加载中...</div>
  </div>

  <script>
    const BASE = '{{ request.script_root }}';
    async function init() {
      const r = await fetch(BASE + '/api/sessions');
      const sessions = await r.json();
      if (!sessions.length) {
        document.getElementById('content').innerHTML =
          '<div class="empty"><span class="emoji">📋</span>暂无会话</div>';
        return;
      }
      const html = sessions.map(s => {
        const time = s.created_at.replace('T', ' ').slice(0, 16);
        return `
          <div class="session-card" data-sid="${s.id}">
            <div class="session-card-head">
              <div class="session-card-title">${s.title}</div>
              <div class="session-card-code">${s.id}</div>
            </div>
            <div class="session-card-meta">${s.order_count} 份订单 · ${time}</div>
            <div class="session-card-foot">
              <div></div>
              <button class="btn-del" data-del="${s.id}">删除</button>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('content').innerHTML = html;

      document.getElementById('content').addEventListener('click', async (e) => {
        const del = e.target.closest('[data-del]');
        if (del) {
          e.stopPropagation();
          e.preventDefault();
          if (!confirm('确定删除这个会话？')) return;
          const r = await fetch(BASE + '/api/session/' + del.dataset.del, { method: 'DELETE' });
          if (r.ok) init();
          return;
        }
        const card = e.target.closest('.session-card');
        if (card) location.href = BASE + '/admin/' + card.dataset.sid;
      });
    }
    init();

    document.getElementById('btnClear').addEventListener('click', async () => {
      if (!confirm('确定清空全部会话？此操作不可恢复！')) return;
      const r = await fetch(BASE + '/api/sessions', { method: 'DELETE' });
      if (r.ok) init();
    });

    async function downloadFile(url, filename) {
      const r = await fetch(BASE + url);
      if (!r.ok) { alert('导出失败'); return false; }
      const blob = await r.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
      return true;
    }

    document.getElementById('btnExportSummary').addEventListener('click', async () => {
      const btn = document.getElementById('btnExportSummary');
      btn.disabled = true;
      btn.textContent = '导出中...';
      try { await downloadFile('/api/export', '统计汇总.xlsx'); }
      finally { btn.disabled = false; btn.textContent = '导出汇总'; }
    });

    document.getElementById('btnExportDetail').addEventListener('click', async () => {
      const btn = document.getElementById('btnExportDetail');
      btn.disabled = true;
      btn.textContent = '导出中...';
      try { await downloadFile('/api/export/detail', '明细统计.xlsx'); }
      finally { btn.disabled = false; btn.textContent = '导出明细'; }
    });
  </script>
</body>
</html>
