<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>后台汇总</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .admin-dish {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 12px 0;
      box-shadow: var(--shadow);
    }
    .admin-dish-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 8px;
    }
    .admin-dish-name {
      font-size: 17px;
      font-weight: 600;
    }
    .admin-dish-stat {
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
    }
    .admin-spec {
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .admin-spec:last-child {
      border-bottom: none;
    }
    .admin-spec-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .admin-spec-text {
      font-size: 13px;
      color: var(--text);
    }
    .admin-spec-text .muted {
      color: var(--text-light);
    }
    .admin-spec-cnt {
      background: #fef0eb;
      color: var(--primary);
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .admin-spec-owners {
      font-size: 12px;
      color: var(--text-light);
    }
    .admin-spec-owners .pill {
      display: inline-block;
      background: #ecf0f1;
      color: var(--text);
      padding: 1px 8px;
      border-radius: 4px;
      margin: 2px 4px 0 0;
    }
    .admin-spec-owners .pill .no {
      color: var(--primary);
      font-weight: 600;
      margin-right: 2px;
    }

    /* 视图切换 tab */
    .view-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      position: sticky;
      top: 56px;
      background: var(--card-bg);
      z-index: 9;
    }
    .view-tab {
      padding: 8px 14px;
      border-radius: 8px;
      background: #f0f0f0;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .view-tab.active {
      background: var(--primary);
      color: #fff;
    }

    /* 项目计数表 */
    .items-table {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin: 12px 0;
    }
    .items-table-head,
    .items-table-row {
      display: grid;
      grid-template-columns: 1fr 60px 1.2fr;
      align-items: center;
      padding: 10px 14px;
      gap: 8px;
    }
    .items-table-head {
      background: #fef0eb;
      color: var(--primary);
      font-weight: 600;
      font-size: 13px;
    }
    .items-table-row {
      border-top: 1px solid var(--border);
      font-size: 14px;
    }
    .items-table-row .col-name {
      font-weight: 500;
    }
    .items-table-row .col-name .tag {
      font-size: 11px;
      padding: 1px 6px;
      margin-left: 6px;
    }
    .items-table-row .col-cnt {
      color: var(--primary);
      font-weight: 600;
      text-align: right;
    }
    .items-table-row .col-users {
      color: var(--text-light);
      font-size: 12px;
    }
    .items-table-row .col-users .no {
      color: var(--primary);
      font-weight: 600;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="container container-wide">
    <div class="appbar">
      <div>
        <h1 id="sessionTitle">后台汇总</h1>
        <div class="meta">会话码：<strong id="sessionCode" style="color:var(--primary);font-size:14px;">{{ session_id }}</strong></div>
      </div>
      <div class="row">
        <a class="btn btn-ghost btn-sm" href="/summary/{{ session_id }}">按人汇总</a>
        <a class="btn btn-ghost btn-sm" href="/menu/{{ session_id }}">点单页</a>
      </div>
    </div>

    <div class="view-tabs" id="viewTabs">
      <div class="view-tab active" data-view="dish">按菜品汇总</div>
      <div class="view-tab" data-view="items">按项目计数</div>
    </div>

    <div id="content">加载中...</div>
  </div>

  <script>
    const SESSION_ID = "{{ session_id }}";
    let MENU = null;
    let CURRENT_SESSION = null;
    let CURRENT_VIEW = 'dish';

    async function init() {
      const [menuRes, sessionRes] = await Promise.all([
        fetch('/api/menu'),
        fetch('/api/session/' + SESSION_ID)
      ]);
      if (!menuRes.ok || !sessionRes.ok) {
        document.getElementById('content').innerHTML =
          '<div class="empty"><span class="emoji">😢</span>会话不存在或已失效</div>';
        return;
      }
      MENU = await menuRes.json();
      CURRENT_SESSION = await sessionRes.json();
      document.getElementById('sessionTitle').textContent = CURRENT_SESSION.title + ' · 后台';
      render();

      // tab 切换
      document.querySelectorAll('#viewTabs .view-tab').forEach(el => {
        el.addEventListener('click', () => {
          CURRENT_VIEW = el.dataset.view;
          document.querySelectorAll('#viewTabs .view-tab').forEach(t => {
            t.classList.toggle('active', t === el);
          });
          render();
        });
      });
    }

    function dishName(id) { return (MENU.dishes.find(d => d.id === id) || {}).name || '未知菜品'; }
    // 展示名：菜名（主食底）—— 有 base 才拼后缀
    function displayName(o) {
      const d = MENU.dishes.find(x => x.id === o.dish_id) || {};
      return d.name + (o.base ? `（${o.base}）` : '');
    }
    function sauceName(id) { return (MENU.sauces.find(s => s.id === id) || {}).name; }
    function addonName(id) { return (MENU.addons.find(a => a.id === id) || {}).name; }

    // 规格 key：主食底 + 酱料id排序 + 附加品id排序 + 备注
    function specKey(o) {
      const sauces = [...(o.sauce_ids || [])].sort();
      const addons = [...(o.addon_ids || [])].sort();
      return (o.base || '') + '|' + sauces.join(',') + '|' + addons.join(',') + '|' + (o.note || '');
    }
    function specLabel(o) {
      const parts = [];
      if (o.sauce_ids && o.sauce_ids.length) {
        parts.push(o.sauce_ids.map(sauceName).join('+'));
      } else {
        parts.push('酱料：默认');
      }
      if (o.addon_ids && o.addon_ids.length) {
        parts.push('加' + o.addon_ids.map(addonName).join('+'));
      }
      if (o.note) parts.push('备注：' + o.note);
      return parts.join(' · ');
    }

    function render() {
      if (CURRENT_VIEW === 'dish') renderDish();
      else renderItems();
    }

    // ---- 视图1：按菜品汇总 ----
    function renderDish() {
      const session = CURRENT_SESSION;
      if (!session.orders.length) {
        document.getElementById('content').innerHTML =
          '<div class="empty"><span class="emoji">📋</span>还没人点单</div>';
        return;
      }

      // 一级：按 dish 分组
      const byDish = {};
      session.orders.forEach(o => {
        // 按展示名（菜名 + 主食底）分组：相同菜不同底拆成不同行
        const key = displayName(o);
        if (!byDish[key]) byDish[key] = [];
        byDish[key].push(o);
      });

      // 保持原始顺序（按首次出现）
      const orderedDishNames = [];
      session.orders.forEach(o => {
        const key = displayName(o);
        if (!orderedDishNames.includes(key)) orderedDishNames.push(key);
      });

      const grandTotal = session.orders.reduce((s, o) => s + o.unit_price, 0);

      const html = orderedDishNames.map(displayLabel => {
        const orders = byDish[displayLabel];
        const dishTotal = orders.reduce((s, o) => s + o.unit_price, 0);
        // 二级：按 spec 分组
        const bySpec = {};
        orders.forEach(o => {
          const k = specKey(o);
          if (!bySpec[k]) bySpec[k] = { sample: o, owners: [] };
          bySpec[k].owners.push(o);
        });
        const specsHtml = Object.values(bySpec).map(({ sample, owners }) => {
          const ownersHtml = owners.map(o =>
            `<span class="pill"><span class="no">${o.user_no}号</span>${o.user_name}</span>`
          ).join('');
          return `
            <div class="admin-spec">
              <div class="admin-spec-line">
                <div class="admin-spec-text">${specLabel(sample)}</div>
                <div class="admin-spec-cnt">× ${owners.length}</div>
              </div>
              <div class="admin-spec-owners">${ownersHtml}</div>
            </div>
          `;
        }).join('');
        return `
          <div class="admin-dish">
            <div class="admin-dish-head">
              <div class="admin-dish-name">${displayLabel}</div>
              <div class="admin-dish-stat">× ${orders.length} 份 · ¥${dishTotal.toFixed(2)}</div>
            </div>
            ${specsHtml}
          </div>
        `;
      }).join('');

      document.getElementById('content').innerHTML = html + `
        <div class="grand-total">
          <div class="label">合计 ${session.orders.length} 份</div>
          <div class="num">¥${grandTotal.toFixed(2)}</div>
        </div>
      `;
    }

    // ---- 视图2：按项目计数（菜品 / 酱料 / 附加品各算一条） ----
    function renderItems() {
      const session = CURRENT_SESSION;
      if (!session.orders.length) {
        document.getElementById('content').innerHTML =
          '<div class="empty"><span class="emoji">📋</span>还没人点单</div>';
        return;
      }

      // 聚合：key = 'dish:<id>:<base>' / 'sauce:<id>' / 'addon:<id>'
      const map = {};
      function bump(key, name, tag, userNo) {
        if (!map[key]) map[key] = { name, tag, count: 0, userNos: new Set() };
        map[key].count += 1;
        map[key].userNos.add(userNo);
      }
      session.orders.forEach(o => {
        bump('dish:' + o.dish_id + ':' + (o.base || ''), displayName(o), '菜品', o.user_no);
        (o.sauce_ids || []).forEach(sid => {
          bump('sauce:' + sid, sauceName(sid), '酱料', o.user_no);
        });
        (o.addon_ids || []).forEach(aid => {
          bump('addon:' + aid, addonName(aid), '附加品', o.user_no);
        });
      });

      const rows = Object.values(map).map(r => ({
        name: r.name,
        tag: r.tag,
        count: r.count,
        userNos: [...r.userNos].sort((a, b) => a - b),
      }));
      // 按数量降序，同数量按名称
      rows.sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, 'zh-Hans-CN'));

      const totalItems = rows.reduce((s, r) => s + r.count, 0);
      const rowsHtml = rows.map(r => {
        const users = r.userNos.map(n => `<span class="no">${n}号</span>`).join(' ');
        return `
          <div class="items-table-row">
            <div class="col-name">${r.name}<span class="tag">${r.tag}</span></div>
            <div class="col-cnt">× ${r.count}</div>
            <div class="col-users">${users}</div>
          </div>
        `;
      }).join('');

      document.getElementById('content').innerHTML = `
        <div class="items-table">
          <div class="items-table-head">
            <div>项目</div>
            <div style="text-align:right;">数量</div>
            <div>序号</div>
          </div>
          ${rowsHtml}
        </div>
        <div class="grand-total">
          <div class="label">合计 ${rows.length} 项 · 共 ${totalItems} 件</div>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
